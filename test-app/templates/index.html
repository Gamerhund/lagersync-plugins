<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LagerSync Plugin-Test-Umgebung</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #2c5364 100%);
            color: #e8f0ec;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        .header p {
            color: rgba(255,255,255,0.7);
        }
        .section {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        .section h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .plugin-list {
            display: grid;
            gap: 15px;
        }
        .plugin-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .plugin-info h3 {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        .plugin-info p {
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
        .plugin-status {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .badge-inactive {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }
        .badge-active {
            background: rgba(34,197,94,0.2);
            color: #22c55e;
            border: 1px solid rgba(34,197,94,0.3);
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #FF6B35;
            color: white;
        }
        .btn-primary:hover {
            background: #FF5722;
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.2);
        }
        .btn-danger {
            background: rgba(244,67,54,0.2);
            color: #f44336;
            border: 1px solid rgba(244,67,54,0.3);
        }
        .btn-danger:hover {
            background: rgba(244,67,54,0.3);
        }
        .settings-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
        }
        .settings-panel.active {
            display: block;
        }
        .mock-data {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .mock-data-section {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
        }
        .mock-data-section h3 {
            margin-bottom: 15px;
        }
        .data-item {
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .data-item:last-child {
            margin-bottom: 0;
        }
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            background: rgba(34,197,94,0.2);
            border: 1px solid rgba(34,197,94,0.3);
            color: #22c55e;
            z-index: 1000;
            display: none;
        }
        .notification.show {
            display: block;
        }
        .notification.error {
            background: rgba(244,67,54,0.2);
            border-color: rgba(244,67,54,0.3);
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧩 Plugin-Test-Umgebung</h1>
            <p>Entwickle und teste Plugins lokal ohne die Haupt-App zu beeinflussen</p>
        </div>

        <div class="section">
            <h2>Verfügbare Plugins</h2>
            <div class="plugin-list" id="plugin-list">
            </div>
        </div>

        <div class="section" id="settings-section" style="display:none;">
            <h2>Plugin-Einstellungen</h2>
            <div id="plugin-settings"></div>
        </div>

        <div class="section">
            <h2>Test-Datenbank</h2>
            <div class="mock-data">
                <div class="mock-data-section">
                    <h3>📦 Produkte</h3>
                    <div id="mock-products"></div>
                </div>
                <div class="mock-data-section">
                    <h3>📍 Lagerorte</h3>
                    <div id="mock-locations"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="notification" id="notification"></div>

    <script>
        const API_BASE = '';

        function escapeHtml(text) {
            if (typeof text !== 'string') text = String(text || '');
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showNotification(message, isError = false) {
            const notification = document.getElementById('notification');
            notification.textContent = message;
            notification.className = 'notification show' + (isError ? ' error' : '');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        async function loadPlugins() {
            try {
                const response = await fetch(`${API_BASE}/api/plugins`);
                const plugins = await response.json();
                renderPlugins(plugins);
            } catch (error) {
                showNotification('Fehler beim Laden der Plugins', true);
            }
        }

        function renderPlugins(plugins) {
            const container = document.getElementById('plugin-list');
            container.innerHTML = plugins.map(plugin => {
                const name = escapeHtml(plugin.name);
                const configName = escapeHtml(plugin.config.name);
                const configDesc = escapeHtml(plugin.config.description);
                const configVer = escapeHtml(plugin.config.version);
                const configAuthor = escapeHtml(plugin.config.author);
                
                return `
                    <div class="plugin-item">
                        <div class="plugin-info">
                            <h3>${configName}</h3>
                            <p>${configDesc}</p>
                            <p style="margin-top: 5px; font-size: 0.8rem;">
                                Version: ${configVer} | Autor: ${configAuthor}
                            </p>
                        </div>
                        <div class="plugin-status">
                            <span class="badge ${plugin.active ? 'badge-active' : 'badge-inactive'}">
                                ${plugin.active ? '✅ Aktiv' : '⚪ Inaktiv'}
                            </span>
                            ${!plugin.active ? `
                                <button class="btn btn-primary btn-activate" data-plugin-name="${name}">
                                    Aktivieren
                                </button>
                            ` : `
                                <button class="btn btn-secondary btn-settings" data-plugin-name="${name}">
                                    Einstellungen
                                </button>
                                <button class="btn btn-danger btn-deactivate" data-plugin-name="${name}">
                                    Deaktivieren
                                </button>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function activatePlugin(pluginName) {
            try {
                const response = await fetch(`${API_BASE}/api/plugins/${pluginName}/activate`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(result.message);
                    loadPlugins();
                    setTimeout(() => openSettings(pluginName), 500);
                } else {
                    showNotification(result.error, true);
                }
            } catch (error) {
                showNotification('Fehler beim Aktivieren: ' + error.message, true);
            }
        }

        async function deactivatePlugin(pluginName) {
            try {
                const response = await fetch(`${API_BASE}/api/plugins/${pluginName}/deactivate`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    showNotification(result.message);
                    loadPlugins();
                    document.getElementById('settings-section').style.display = 'none';
                } else {
                    showNotification(result.error, true);
                }
            } catch (error) {
                showNotification('Fehler beim Deaktivieren', true);
            }
        }

        async function openSettings(pluginName) {
            try {
                const response = await fetch(`${API_BASE}/api/plugins/${pluginName}/settings`);
                const result = await response.json();
                
                if (result.success) {
                    const settingsSection = document.getElementById('settings-section');
                    const settingsContainer = document.getElementById('plugin-settings');
                    
                    settingsSection.style.display = 'block';
                    
                    const configName = escapeHtml(result.config.name);
                    const configDesc = escapeHtml(result.config.description);
                    const escapedFrontend = result.frontend ? escapeHtml(result.frontend) : '';
                    
                    settingsContainer.innerHTML = `
                        <h3>${configName}</h3>
                        <p style="margin-bottom: 20px; color: rgba(255,255,255,0.6);">
                            ${configDesc}
                        </p>
                        ${result.frontend ? `
                            <div style="background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px;">
                                <h4 style="margin-bottom: 10px;">Frontend-Code:</h4>
                                <pre style="white-space: pre-wrap; word-wrap: break-word; font-size: 0.85rem;">${escapedFrontend}</pre>
                            </div>
                        ` : '<p>Kein Frontend-Code verfügbar</p>'}
                    `;
                    
                    if (result.frontend) {
                        try {
                            const script = document.createElement('script');
                            script.textContent = result.frontend;
                            document.head.appendChild(script);
                            document.head.removeChild(script);
                        } catch (error) {
                            console.error('Fehler beim Ausführen des Frontend-Codes:', error);
                        }
                    }
                } else {
                    showNotification(result.error, true);
                }
            } catch (error) {
                showNotification('Fehler beim Laden der Einstellungen', true);
            }
        }

        async function loadMockData() {
            try {
                const response = await fetch(`${API_BASE}/api/mock-data`);
                const data = await response.json();
                
                document.getElementById('mock-products').innerHTML = Object.entries(data.products)
                    .map(([id, product]) => {
                        const name = escapeHtml(product.name);
                        const loc = escapeHtml(product.location);
                        const stock = Number(product.stock);
                        const minStock = Number(product.min_stock);
                        return `
                            <div class="data-item">
                                <strong>${name}</strong><br>
                                <small>Bestand: ${stock} | Min: ${minStock} | Ort: ${loc}</small>
                            </div>
                        `;
                    }).join('');
                
                document.getElementById('mock-locations').innerHTML = Object.entries(data.locations)
                    .map(([id, location]) => {
                        const name = escapeHtml(location.name);
                        const cap = Number(location.capacity);
                        return `
                            <div class="data-item">
                                <strong>${name}</strong><br>
                                <small>Kapazität: ${cap}</small>
                            </div>
                        `;
                    }).join('');
            } catch (error) {
                console.error('Fehler beim Laden der Mock-Daten:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadPlugins();
            loadMockData();

            document.getElementById('plugin-list').addEventListener('click', (e) => {
                const activateBtn = e.target.closest('.btn-activate');
                if (activateBtn) {
                    activatePlugin(activateBtn.getAttribute('data-plugin-name'));
                }
                const settingsBtn = e.target.closest('.btn-settings');
                if (settingsBtn) {
                    openSettings(settingsBtn.getAttribute('data-plugin-name'));
                }
                const deactivateBtn = e.target.closest('.btn-deactivate');
                if (deactivateBtn) {
                    deactivatePlugin(deactivateBtn.getAttribute('data-plugin-name'));
                }
            });
        });
    </script>
</body>
</html>
