name: Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-readme:
    name: Update README with Plugin List
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: README aktualisieren
        run: python3 .github/scripts/update_readme.py

      - name: Änderungen committen und PR erstellen
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md README_EN.md
          git diff --staged --quiet || git commit -m "chore: aktualisiere Plugin-Liste in README [skip ci]"
          
          # Branch erstellen und PR
          BRANCH_NAME="chore/update-readme-$(date +%s)"
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          
          # PR erstellen mit GitHub CLI
          gh pr create \
            --title "chore: aktualisiere Plugin-Liste in README" \
            --body "Automatischer PR zur Aktualisierung der Plugin-Liste in README.md und README_EN.md" \
            --base main \
            --head "$BRANCH_NAME"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
