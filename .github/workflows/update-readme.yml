name: Update README

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update README with Plugin List
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: README aktualisieren
        run: python3 .github/scripts/update_readme.py

      - name: Änderungen committen
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md README_EN.md
          git diff --staged --quiet || git commit -m "chore: aktualisiere Plugin-Liste in README [skip ci]"
          git push
